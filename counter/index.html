<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport"
      content="width=device-width,
              initial-scale=1.0,
              maximum-scale=1.0,
              user-scalable=no">
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="style.css">
  <meta name="theme-color" content="#111111">
  <title>タップカウンター</title>
</head>

<body>

  <div id="counter">0</div>
  
  <div id="subcounterArea">
    <span id="subcounter">1</span>セット目
  </div>
  
  <div id="timerArea">
    休憩 <span id="timerDisplay">00:15</span>
  </div>
  
  <div id="timerButtons">
    <button id="timerStartButton">START</button>
    <button id="timerResetButton">RESET</button>
  </div>

  <div id="setButtons">
    <button id="subplusButton">+</button>
    <button id="subresetButton">reset</button>
    <button id="subminusButton">-</button>
  </div>
  
  <button id="resetButton">回数リセット</button>

  <script src="script.js"></script>
  <!--
  <script>
    if('serviceWorker' in navigator){
      navigator.serviceWorker.register('./sw.js');
    }
  </script>
-->
</body>
</html>
